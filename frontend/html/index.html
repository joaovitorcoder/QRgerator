<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
    <!--CDN da biblioteca para criar os QRcodes-->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body> 
    <main>
        <div class="QRcode-creator">
            <div class="input-group mb-3">
                <input type="text" class="form-control" aria-label="Text input with segmented dropdown button" placeholder="Insira seu link" id="input-link">
                <button type="button" class="btn btn-outline-secondary" onclick="criar_QR()">Criar</button>
                <button type="button" class="btn btn-outline-danger" onclick="limpar_QR()">Limpar</button>
            </div>
            <div id="qrcode"></div>
        </div>
    </main>

    
</body>
<!--Importação do arquivo que vai gerar o QRcode-->
<script src="../javascript/script.js"></script>
</html>
